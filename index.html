<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SINAPI — Especificações Técnicas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul: #005CA9;
    --azul-escuro: #003D72;
    --amarelo: #F7A800;
    --cinza-bg: #F2F4F7;
    --cinza-borda: #D5DAE2;
    --cinza-texto: #6B7280;
    --texto: #1A1F2E;
    --branco: #ffffff;
    --verde: #0A7C42;
    --vermelho: #C0392B;
  }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--cinza-bg);
    color: var(--texto);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--azul-escuro);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    height: 64px;
    border-bottom: 3px solid var(--amarelo);
  }
  .logo-caixa {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--amarelo);
    letter-spacing: 2px;
  }
  .header-divider {
    width: 1px;
    height: 28px;
    background: rgba(255,255,255,0.2);
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* MAIN */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 2.5rem 1.5rem 4rem;
  }

  /* BUSCA */
  .busca-wrap {
    background: var(--branco);
    border: 1px solid var(--cinza-borda);
    border-radius: 12px;
    padding: 1.75rem 2rem;
    margin-bottom: 1.75rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .busca-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cinza-texto);
    margin-bottom: 0.6rem;
    display: block;
  }
  .busca-row {
    display: flex;
    gap: 0.75rem;
  }
  .busca-input {
    flex: 1;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.6rem;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--azul-escuro);
    border: 2px solid var(--cinza-borda);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    outline: none;
    transition: border-color 0.15s;
    background: var(--cinza-bg);
  }
  .busca-input:focus {
    border-color: var(--azul);
    background: var(--branco);
  }
  .busca-input::placeholder {
    color: #BEC4CC;
    font-weight: 600;
  }
  .btn-buscar {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--azul);
    color: var(--branco);
    border: none;
    border-radius: 8px;
    padding: 0 1.75rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-buscar:hover { background: var(--azul-escuro); }
  .btn-buscar:active { transform: scale(0.97); }

  /* ERRO */
  .erro {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-left: 4px solid var(--vermelho);
    border-radius: 8px;
    padding: 1rem 1.25rem;
    color: var(--vermelho);
    font-size: 0.95rem;
    display: none;
    margin-top: 0.75rem;
  }

  /* RESULTADO */
  #resultado { display: none; }

  .comp-header {
    background: var(--azul-escuro);
    border-radius: 10px 10px 0 0;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    justify-content: space-between;
  }
  .comp-codigo-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: var(--amarelo);
    line-height: 1;
    white-space: nowrap;
  }
  .comp-desc {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    line-height: 1.4;
    letter-spacing: 0.3px;
    flex: 1;
  }
  .comp-unidade {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: var(--azul-escuro);
    background: var(--amarelo);
    border-radius: 4px;
    padding: 3px 10px;
    white-space: nowrap;
    align-self: flex-start;
    margin-top: 2px;
  }

  .comp-meta {
    background: #EBF2FA;
    border-left: 1px solid var(--cinza-borda);
    border-right: 1px solid var(--cinza-borda);
    padding: 0.6rem 1.5rem;
    display: flex;
    gap: 2rem;
    font-size: 0.8rem;
    color: var(--cinza-texto);
  }
  .comp-meta span strong {
    color: var(--azul-escuro);
    font-weight: 500;
  }

  .comp-body {
    background: var(--branco);
    border: 1px solid var(--cinza-borda);
    border-top: none;
    border-radius: 0 0 10px 10px;
    overflow: hidden;
  }

  .secao {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--cinza-borda);
  }
  .secao:last-child { border-bottom: none; }

  .secao-titulo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--azul);
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .secao-titulo::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--cinza-borda);
  }

  .secao-items {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }
  .secao-items li {
    font-size: 0.93rem;
    color: var(--texto);
    line-height: 1.55;
    padding-left: 1rem;
    position: relative;
  }
  .secao-items li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--cinza-borda);
    font-size: 0.8rem;
  }

  /* AÇÕES */
  .acoes {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.25rem;
  }
  .btn-copiar {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--verde);
    color: var(--branco);
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1.5rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .btn-copiar:hover { background: #085C31; }
  .btn-copiar:active { transform: scale(0.97); }
  .btn-copiar svg { width: 16px; height: 16px; }

  .btn-copiar.copiado {
    background: #0A5C38;
  }

  .btn-nova {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: transparent;
    color: var(--cinza-texto);
    border: 1px solid var(--cinza-borda);
    border-radius: 8px;
    padding: 0.65rem 1.25rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .btn-nova:hover { border-color: var(--azul); color: var(--azul); }

  /* STATUS SITUACAO */
  .badge-situacao {
    display: inline-block;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .badge-ativo { background: #D1FAE5; color: #065F46; }
  .badge-semcusto { background: #FEF3C7; color: #92400E; }
  .badge-inativo { background: #FEE2E2; color: #991B1B; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 3rem;
    color: var(--cinza-texto);
    font-size: 0.95rem;
    display: none;
  }

  /* RODAPÉ INFO */
  .info-total {
    font-size: 0.8rem;
    color: var(--cinza-texto);
    margin-top: 0.5rem;
  }
  .info-total strong { color: var(--azul); }
</style>
</head>
<body>

<header>
  <div class="logo-caixa">CAIXA</div>
  <div class="header-divider"></div>
  <div class="header-title">SINAPI — Especificações Técnicas</div>
</header>

<main>
  <div class="busca-wrap">
    <label class="busca-label" for="input-codigo">Código da composição</label>
    <div class="busca-row">
      <input
        class="busca-input"
        id="input-codigo"
        type="text"
        placeholder="ex: 105001"
        maxlength="10"
        autocomplete="off"
      />
      <button class="btn-buscar" onclick="buscar()">Buscar</button>
    </div>
    <div class="erro" id="erro"></div>
    <div class="info-total" id="info-total"></div>
  </div>

  <div class="loading" id="loading">Carregando base de dados...</div>

  <div id="resultado">
    <div class="comp-header">
      <div>
        <div class="comp-codigo-badge" id="res-codigo"></div>
        <div class="comp-desc" id="res-desc"></div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
        <div class="comp-unidade" id="res-unidade"></div>
        <div id="res-situacao"></div>
      </div>
    </div>

    <div class="comp-meta">
      <span>Caderno: <strong id="res-caderno"></strong></span>
      <span>Vigência: <strong id="res-vigencia"></strong></span>
      <span>Atualização: <strong id="res-atualizacao"></strong></span>
    </div>

    <div class="comp-body">
      <div class="secao" id="wrap-caracteristicas">
        <div class="secao-titulo">Itens e suas características</div>
        <ul class="secao-items" id="res-caracteristicas"></ul>
      </div>
      <div class="secao" id="wrap-equipamentos">
        <div class="secao-titulo">Equipamentos</div>
        <ul class="secao-items" id="res-equipamentos"></ul>
      </div>
      <div class="secao" id="wrap-criterios">
        <div class="secao-titulo">Critérios para quantificação dos serviços</div>
        <ul class="secao-items" id="res-criterios"></ul>
      </div>
      <div class="secao" id="wrap-execucao">
        <div class="secao-titulo">Execução</div>
        <ul class="secao-items" id="res-execucao"></ul>
      </div>
    </div>

    <div class="acoes">
      <button class="btn-copiar" id="btn-copiar" onclick="copiarTexto()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
        Copiar texto formatado
      </button>
      <button class="btn-nova" onclick="novaBusca()">Nova busca</button>
    </div>
  </div>
</main>

<script>
  let db = null;

  // Carrega o JSON ao iniciar
  async function carregarBase() {
    document.getElementById('loading').style.display = 'block';
    try {
      const resp = await fetch('sinapi_composicoes.json');
      if (!resp.ok) throw new Error('Arquivo não encontrado');
      db = await resp.json();
      const total = Object.keys(db).length;
      document.getElementById('info-total').innerHTML =
        `Base carregada: <strong>${total}</strong> composições disponíveis`;
    } catch (e) {
      document.getElementById('info-total').textContent =
        'Erro ao carregar sinapi_composicoes.json — verifique se o arquivo está na mesma pasta.';
    }
    document.getElementById('loading').style.display = 'none';
  }

  function buscar() {
    const codigo = document.getElementById('input-codigo').value.trim();
    const erroEl = document.getElementById('erro');

    erroEl.style.display = 'none';
    document.getElementById('resultado').style.display = 'none';

    if (!codigo) {
      mostrarErro('Digite um código de composição.');
      return;
    }
    if (!db) {
      mostrarErro('Base de dados ainda não carregada. Aguarde.');
      return;
    }

    const comp = db[codigo];
    if (!comp) {
      mostrarErro(`Composição ${codigo} não encontrada na base.`);
      return;
    }

    renderizar(comp);
  }

  function renderizar(comp) {
    document.getElementById('res-codigo').textContent = comp.codigo;
    document.getElementById('res-desc').textContent = comp.descricao;
    document.getElementById('res-unidade').textContent = comp.unidade || '—';
    document.getElementById('res-caderno').textContent = comp.caderno || '—';
    document.getElementById('res-vigencia').textContent = comp.vigencia || '—';
    document.getElementById('res-atualizacao').textContent = comp.atualizacao || '—';

    // Badge situação
    const sit = (comp.situacao || '').toUpperCase();
    let cls = 'badge-ativo';
    if (sit.includes('SEM CUSTO')) cls = 'badge-semcusto';
    else if (sit.includes('INATIVO') || sit.includes('CANCELADO')) cls = 'badge-inativo';
    document.getElementById('res-situacao').innerHTML =
      `<span class="badge-situacao ${cls}">${sit || 'ATIVO'}</span>`;

    renderSecao('res-caracteristicas', 'wrap-caracteristicas', comp.itens_caracteristicas);
    renderSecao('res-equipamentos',    'wrap-equipamentos',    comp.equipamentos);
    renderSecao('res-criterios',       'wrap-criterios',       comp.criterios_quantificacao);
    renderSecao('res-execucao',        'wrap-execucao',        comp.execucao);

    document.getElementById('resultado').style.display = 'block';
    document.getElementById('btn-copiar').textContent = '📋 Copiar texto formatado';
    document.getElementById('btn-copiar').classList.remove('copiado');
  }

  function renderSecao(listaId, wrapId, items) {
    const ul = document.getElementById(listaId);
    const wrap = document.getElementById(wrapId);

    const validos = (items || []).filter(i => i && !i.includes('Não se aplica'));
    if (validos.length === 0) {
      wrap.style.display = 'none';
      return;
    }
    wrap.style.display = 'block';
    ul.innerHTML = validos.map(item => {
      const texto = item.replace(/^-\s*/, '');
      return `<li>${texto}</li>`;
    }).join('');
  }

  function gerarTextoFormatado(comp) {
    let linhas = [];

    linhas.push(`*${comp.codigo} - ${comp.descricao}*`);
    linhas.push('');

    const secoes = [
      { titulo: 'ITENS E SUAS CARACTERÍSTICAS', items: comp.itens_caracteristicas },
      { titulo: 'CRITÉRIOS PARA QUANTIFICAÇÃO DOS SERVIÇOS', items: comp.criterios_quantificacao },
      { titulo: 'EXECUÇÃO', items: comp.execucao },
    ];

    for (const s of secoes) {
      const validos = (s.items || []).filter(i => i && !i.includes('Não se aplica'));
      if (validos.length === 0) continue;
      linhas.push(`*${s.titulo}*`);
      for (const item of validos) {
        linhas.push(item.startsWith('-') ? item : `- ${item}`);
      }
      linhas.push('');
    }

    return linhas.join('\n').trim();
  }

  async function copiarTexto() {
    const codigo = document.getElementById('res-codigo').textContent;
    const comp = db[codigo];
    if (!comp) return;

    const texto = gerarTextoFormatado(comp);
    try {
      await navigator.clipboard.writeText(texto);
      const btn = document.getElementById('btn-copiar');
      btn.innerHTML = '✓ Copiado!';
      btn.classList.add('copiado');
      setTimeout(() => {
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:16px;height:16px"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar texto formatado`;
        btn.classList.remove('copiado');
      }, 2500);
    } catch {
      alert('Não foi possível copiar automaticamente. Selecione o texto manualmente.');
    }
  }

  function novaBusca() {
    document.getElementById('resultado').style.display = 'none';
    document.getElementById('erro').style.display = 'none';
    document.getElementById('input-codigo').value = '';
    document.getElementById('input-codigo').focus();
  }

  function mostrarErro(msg) {
    const el = document.getElementById('erro');
    el.textContent = msg;
    el.style.display = 'block';
  }

  // Enter para buscar
  document.addEventListener('DOMContentLoaded', () => {
    carregarBase();
    document.getElementById('input-codigo').addEventListener('keydown', e => {
      if (e.key === 'Enter') buscar();
    });
  });
</script>

</body>
</html>
